name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: yt-dpl-linux-x86_64.tar.gz

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: yt-dpl-linux-x86_64-musl.tar.gz

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: yt-dpl-linux-arm64.tar.gz

          - os: macos-latest
            target: x86_64-apple-darwin
            archive: yt-dpl-macos-x86_64.tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            archive: yt-dpl-macos-arm64.tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: yt-dpl-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross-compilation deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          elif [[ "${{ matrix.target }}" == "x86_64-unknown-linux-musl" ]]; then
            sudo apt-get install -y musl-tools
          fi

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BIN=target/${{ matrix.target }}/release/yt-dpl
          mkdir -p dist
          cp "$BIN" dist/yt-dpl
          cp README.md LICENSE dist/
          tar -czf "${{ matrix.archive }}" -C dist .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release/yt-dpl.exe"
          New-Item -ItemType Directory -Force dist
          Copy-Item $bin dist/yt-dpl.exe
          Copy-Item README.md dist/
          Copy-Item LICENSE dist/
          Compress-Archive -Path dist/* -DestinationPath "${{ matrix.archive }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
          generate_release_notes: true
